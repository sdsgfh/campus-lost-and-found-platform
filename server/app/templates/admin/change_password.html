<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/admin/css/admin.css" rel="stylesheet">
    <style>
        body {
            background-image: url('/static/背景.png');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card-custom {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        }
        h2 {
            color: #2E7D32;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            background-color: #2E7D32;
            border: none;
        }
        .btn-primary:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>
    <div class="card-custom">
        <h2>修改密码</h2>
        <form id="changePwdForm">
            <div class="mb-3">
                <label for="oldPassword" class="form-label">原密码</label>
                <input type="password" class="form-control" id="oldPassword" required>
            </div>
            <div class="mb-3">
                <label for="newPassword" class="form-label">新密码</label>
                <input type="password" class="form-control" id="newPassword" required>
                <div class="form-text">密码必须包含字母和数字，长度至少8位</div>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">确认新密码</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">修改密码</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) {
            window.location.href = '/admin/login';
        }

        document.getElementById('changePwdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (newPassword !== confirmPassword) {
                alert('两次输入密码不一致');
                return;
            }
            const response = await fetch('/admin/api/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ old_password: oldPassword, new_password: newPassword, confirm_password: confirmPassword })
            });
            const data = await response.json();
            if (data.code === 0) {
                alert('密码修改成功，请重新登录');
                localStorage.removeItem('admin_token');
                window.location.href = '/admin/login';
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>
