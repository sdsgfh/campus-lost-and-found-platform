{% extends "admin/layout.html" %}
{% block title %}审核日志{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">审核日志</h1>
</div>

<div class="row mb-3">
    <div class="col-md-2">
        <select class="form-select" id="typeFilter">
            <option value="">全部类型</option>
            <option value="report">举报</option>
            <option value="appeal">申诉</option>
        </select>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="resultFilter">
            <option value="">全部结果</option>
            <option value="approved">成立</option>
            <option value="rejected">不成立</option>
        </select>
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>审核类型</th>
            <th>目标ID</th>
            <th>审核人ID</th>
            <th>审核结果</th>
            <th>原因</th>
            <th>自动审核结果</th>
            <th>审核时间</th>
        </tr>
    </thead>
    <tbody id="auditLogTableBody"></tbody>
</table>
<div id="pagination" class="pagination"></div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/audit_logs.js"></script>
{% endblock %}
