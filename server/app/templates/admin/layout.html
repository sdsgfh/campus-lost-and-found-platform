<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校觅管理后台 - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/admin/css/admin.css" rel="stylesheet">
</head>
<body>
    <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="/admin/dashboard">校觅管理后台</a>
        <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="navbar-nav">
            <div class="nav-item text-nowrap">
                <a class="nav-link px-3" href="#" onclick="logout()">退出</a>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/admin/dashboard">
                                仪表盘
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'users' %}active{% endif %}" href="/admin/users">
                                用户管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'posts' %}active{% endif %}" href="/admin/posts">
                                内容管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'reports' %}active{% endif %}" href="/admin/reports">
                                举报管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'appeals' %}active{% endif %}" href="/admin/appeals">
                                申诉管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'transactions' %}active{% endif %}" href="/admin/transactions">
                                交易记录
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'banners' %}active{% endif %}" href="/admin/banners">
                                轮播图管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'announcements' %}active{% endif %}" href="/admin/announcements">
                                公告管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'notifications' %}active{% endif %}" href="/admin/notifications">
                                发送通知
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'feedbacks' %}active{% endif %}" href="/admin/feedbacks">
                                用户反馈
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'audit_logs' %}active{% endif %}" href="/admin/audit-logs">
                                审核日志
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active == 'statistics' %}active{% endif %}" href="/admin/statistics">
                                数据统计
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/admin/js/admin.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
