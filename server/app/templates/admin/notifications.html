{% extends "admin/layout.html" %}
{% block title %}发送通知{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">发送通知</h1>
</div>

<div class="row">
    <div class="col-md-8">
        <form id="notificationForm">
            <div class="mb-3">
                <label class="form-label">接收用户</label>
                <div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="recipientType" id="allUsers" value="all" checked>
                        <label class="form-check-label" for="allUsers">所有用户</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="recipientType" id="specificUsers" value="specific">
                        <label class="form-check-label" for="specificUsers">指定用户ID（逗号分隔）</label>
                    </div>
                </div>
                <input type="text" class="form-control mt-2" id="userIds" placeholder="例如: 1,2,3" disabled>
            </div>
            <div class="mb-3">
                <label for="title" class="form-label">通知标题</label>
                <input type="text" class="form-control" id="title" required>
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">通知内容</label>
                <textarea class="form-control" id="content" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">发送</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/notifications.js"></script>
{% endblock %}
