{% extends "admin/layout.html" %}
{% block title %}申诉管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">申诉管理</h1>
</div>

<div class="row mb-3">
    <div class="col-md-3">
        <input type="text" class="form-control" id="searchInput" placeholder="搜索申诉者ID">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary" id="searchBtn">搜索</button>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="statusFilter">
            <option value="">全部状态</option>
            <option value="pending">待审核</option>
            <option value="approved">申诉成立</option>
            <option value="rejected">申诉不成立</option>
        </select>
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>申诉类型</th>
            <th>申诉者ID</th>
            <th>目标类型</th>
            <th>目标ID</th>
            <th>状态</th>
            <th>申诉时间</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="appealTableBody"></tbody>
</table>
<div id="pagination" class="pagination"></div>

<!-- 申诉详情模态框（去掉审核按钮） -->
<div class="modal fade" id="appealDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">申诉详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="appealDetailBody">
                <!-- 动态填充 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- 审核结果表单模态框（与举报类似，但可能根据申诉类型调整选项） -->
<div class="modal fade" id="auditAppealModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="auditModalTitle">审核申诉</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="auditAppealId">
                <input type="hidden" id="auditAppealResult">
                <div class="mb-3">
                    <label class="form-label">审核结果</label>
                    <select class="form-select" id="auditResultSelect">
                        <option value="approved">成立</option>
                        <option value="rejected">不成立</option>
                    </select>
                </div>
                <!-- 恶意申诉复选框（可根据需要保留或移除） -->
                <div class="mb-3" id="maliciousCheckGroup" style="display: none;">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="isMalicious">
                        <label class="form-check-label" for="isMalicious">
                            是恶意申诉（将扣除申诉人20信誉分）
                        </label>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">审核意见/原因</label>
                    <textarea class="form-control" id="auditReason" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="confirmAppealAudit()">确认</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/appeals.js"></script>
{% endblock %}
