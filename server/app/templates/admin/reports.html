{% extends "admin/layout.html" %}
{% block title %}举报管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">举报管理</h1>
</div>

<div class="row mb-3">
    <div class="col-md-3">
        <input type="text" class="form-control" id="searchInput" placeholder="搜索举报者ID">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary" id="searchBtn">搜索</button>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="statusFilter">
            <option value="">全部状态</option>
            <option value="pending">待审核</option>
            <option value="approved">举报成立</option>
            <option value="rejected">举报不成立</option>
        </select>
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>举报类型</th>
            <th>二级类型</th>
            <th>举报者ID</th>
            <th>目标类型</th>
            <th>目标ID</th>
            <th>状态</th>
            <th>举报时间</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="reportTableBody"></tbody>
</table>
<div id="pagination" class="pagination"></div>

<!-- 举报详情模态框（修改底部，去掉审核按钮） -->
<div class="modal fade" id="reportDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">举报详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="reportDetailBody">
                <!-- 动态填充 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- 审核结果表单模态框（自动信誉分） -->
<div class="modal fade" id="auditReportModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="auditModalTitle">审核结果</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="auditReportId">
                <div class="mb-3">
                    <label class="form-label">审核结果</label>
                    <select class="form-select" id="auditResultSelect">
                        <option value="approved">成立</option>
                        <option value="rejected">不成立</option>
                    </select>
                </div>
                <div class="mb-3" id="maliciousCheckGroup" style="display: none;">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="isMalicious">
                        <label class="form-check-label" for="isMalicious">
                            是恶意举报（将扣除举报人10信誉分）
                        </label>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">审核意见/原因</label>
                    <textarea class="form-control" id="auditReason" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="confirmAudit()">确认</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/reports.js"></script>
{% endblock %}
