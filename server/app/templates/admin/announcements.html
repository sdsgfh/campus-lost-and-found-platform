{% extends "admin/layout.html" %}
{% block title %}公告管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">公告管理</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button class="btn btn-sm btn-primary" onclick="openModal()">新建公告</button>
    </div>
</div>

<!-- 搜索和筛选 -->
<div class="row mb-3">
    <div class="col-md-4">
        <input type="text" class="form-control" id="searchInput" placeholder="搜索标题" onkeyup="search()">
    </div>
    <div class="col-md-3">
        <select class="form-select" id="statusFilter" onchange="filterStatus()">
            <option value="">全部状态</option>
            <option value="published">已发布</option>
            <option value="draft">草稿</option>
        </select>
    </div>
</div>

<!-- 列表 -->
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>标题</th>
            <th>内容预览</th>
            <th>状态</th>
            <th>发布时间</th>
            <th>创建时间</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="announcementTable"></tbody>
</table>

<!-- 分页 -->
<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>

<!-- 模态框（新增/编辑） -->
<div class="modal fade" id="announcementModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新建公告</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="announcementForm">
                    <input type="hidden" id="announcementId">
                    <div class="mb-3">
                        <label for="title" class="form-label">标题</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">内容</label>
                        <textarea class="form-control" id="content" rows="6" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="publishTime" class="form-label">发布时间</label>
                        <input type="datetime-local" class="form-control" id="publishTime" required>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">状态</label>
                        <select class="form-select" id="status">
                            <option value="published">发布</option>
                            <option value="draft">存为草稿</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveAnnouncement()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/announcements.js"></script>
{% endblock %}
