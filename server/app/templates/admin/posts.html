{% extends "admin/layout.html" %}
{% block title %}内容管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">内容管理</h1>
</div>

<div class="row mb-3">
    <div class="col-md-3">
        <input type="text" class="form-control" id="searchInput" placeholder="搜索ID/标题">
    </div>
    <div class="col-md-1">
        <button class="btn btn-primary" id="searchBtn">搜索</button>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="statusFilter">
            <option value="">全部状态</option>
            <option value="pending">待审核</option>
            <option value="active">进行中</option>
            <option value="completed">已完成</option>
            <option value="expired">已过期</option>
            <option value="off">已下架</option>
            <option value="rejected">已驳回</option>
        </select>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="typeFilter">
            <option value="">全部类型</option>
            <option value="lost">寻物</option>
            <option value="found">招领</option>
            <option value="sale">出售</option>
            <option value="wanted">求购</option>
        </select>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="sortSelect">
            <option value="desc">按发布时间降序</option>
            <option value="asc">按发布时间升序</option>
        </select>
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>标题</th>
            <th>类型</th>
            <th>发布者</th>
            <th>状态</th>
            <th>发布时间</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="postTableBody"></tbody>
</table>
<div id="pagination" class="pagination"></div>

<!-- 帖子详情模态框 -->
<div class="modal fade" id="postDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">帖子详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="postDetailBody">
                <!-- 动态填充 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-warning" id="offPostBtn" onclick="offPost()">下架</button>
                <button type="button" class="btn btn-success" id="restorePostBtn" onclick="restorePost()" style="display:none;">恢复</button>
            </div>
        </div>
    </div>
</div>

<!-- 下架原因模态框 -->
<div class="modal fade" id="offReasonModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">下架原因</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="offPostId">
                <div class="mb-3">
                    <label class="form-label">原因</label>
                    <textarea class="form-control" id="offReason" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">扣除信誉分</label>
                    <input type="number" class="form-control" id="offDeductCredit" value="15">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmOffPost()">确认下架</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/posts.js"></script>
{% endblock %}
